---
layout: default
---

{{ content }}
<div class="post-info">
  &mdash;{{ page.date | date: '%B %e, %Y' }}. No LLMs were used in the writing
  of this post!
</div>
<script
  data-isso="https://chaidarun.com/isso/"
  data-isso-max-comments-nested="inf"
  data-isso-max-comments-top="inf"
  data-isso-postbox-text-text-en="Type a comment..."
  data-isso-postbox-author-placeholder-text-en="Your name"
  src="https://chaidarun.com/isso/js/embed.min.js"
></script>
<div id="isso-thread"></div>
<script>
  (() => {
    // Heading links
    for (const $heading of $$("main h2")) {
      const { id } = $heading;
      if (id) {
        $heading.insertAdjacentHTML(
          "beforeend",
          `<a href="#${id}" title="Link to this heading"><img src="/img/link.svg"></a>`,
        );
      }
    }

    // Footnote tooltips: show each footnote's text when hovering its
    // inline reference number (kramdown renders refs as `a.footnote`)
    for (const $ref of $$("main a.footnote")) {
      const $note = document.getElementById($ref.hash.slice(1));
      if (!$note) {
        continue;
      }
      // Clone so we can drop the trailing backlink without mutating the page
      const $clone = $note.cloneNode(true);
      for (const $back of $clone.querySelectorAll(".reversefootnote")) {
        $back.remove();
      }
      $ref.title = $clone.textContent.replace(/\s+/g, " ").trim();
    }

    // Anchor transitions
    for (const $a of $$('main a[href^="#"]:not([class*="isso-"])')) {
      $a.addEventListener("click", e => {
        const target = document.getElementById($a.hash.slice(1));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: "smooth" });
        }
      });
    }
  })();
</script>
